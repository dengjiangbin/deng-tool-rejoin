# Reference Cloudflare Tunnel ingress for DENG production.
# Token-managed tunnels: apply equivalent path rules in Zero Trust → Networks → Tunnels
# → [your tunnel] → Public Hostname (path rules must appear BEFORE catch-all hostname rules).
#
# Validate locally (reference only — does not affect token tunnel until applied in dashboard):
#   cloudflared tunnel ingress validate --config config/cloudflared-ingress.reference.yml
#
# Test routing:
#   cloudflared tunnel ingress rule --config config/cloudflared-ingress.reference.yml https://aio.deng.my.id/api/fishit-tracker/update-backpack
#   cloudflared tunnel ingress rule --config config/cloudflared-ingress.reference.yml https://aio.deng.my.id/login

ingress:
  # aio.deng.my.id — tracker uploads first (8792)
  - hostname: aio.deng.my.id
    path: ^/api/fishit-tracker/.*
    service: http://127.0.0.1:8792
  - hostname: aio.deng.my.id
    path: ^/api/fish-it-tracker/.*
    service: http://127.0.0.1:8792
  - hostname: aio.deng.my.id
    path: ^/api/tracker/update-backpack
    service: http://127.0.0.1:8792
  - hostname: aio.deng.my.id
    path: ^/api/tracker/update-catalog
    service: http://127.0.0.1:8792
  - hostname: aio.deng.my.id
    service: http://127.0.0.1:8791

  # tool.deng.my.id — tracker uploads first (8792), rest web (8791)
  - hostname: tool.deng.my.id
    path: ^/api/fishit-tracker/.*
    service: http://127.0.0.1:8792
  - hostname: tool.deng.my.id
    path: ^/api/fish-it-tracker/.*
    service: http://127.0.0.1:8792
  - hostname: tool.deng.my.id
    path: ^/api/tracker/update-backpack
    service: http://127.0.0.1:8792
  - hostname: tool.deng.my.id
    path: ^/api/tracker/update-catalog
    service: http://127.0.0.1:8792
  - hostname: tool.deng.my.id
    service: http://127.0.0.1:8791

  # control panel
  - hostname: cp.deng.my.id
    service: http://127.0.0.1:3099

  - service: http_status:404
