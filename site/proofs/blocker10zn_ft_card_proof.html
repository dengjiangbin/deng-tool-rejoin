  <style>
    body { background:#0d0f14; color:#fff; font-family:'Segoe UI',sans-serif; padding:24px; }
    h1 { font-size:16px; margin-bottom:16px; color:#93c5fd; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,240px)); gap:11px; }
    .ft-card { width:100%; min-height:84px; height:84px; border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:10px; overflow:hidden; box-sizing:border-box; border:1px solid rgba(255,255,255,.08); color:#fff; }
    .ft-rarity-SECRET { background:#16d487; }
    .ft-rarity-LEGENDARY { background:#ea580c; }
    .ft-rarity-EPIC { background:#dc2626; }
    .ft-rarity-RARE { background:#2563eb; }
    .ft-rarity-UNCOMMON { background:#65a30d; }
    .ft-rarity-COMMON { background:linear-gradient(135deg,#e2e8f0 0%,#94a3b8 100%); color:#0f172a; }
    .ft-card-icon { flex:0 0 54px; width:54px; height:54px; border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden; background:rgba(255,255,255,.14); }
    .ft-card-icon img { width:100%; height:100%; object-fit:contain; display:block; }
    .ft-card-main { min-width:0; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }
    .ft-card-name { max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:13px; font-weight:800; line-height:16px; text-shadow:0 1px 2px rgba(0,0,0,.45); }
    .ft-rarity-COMMON .ft-card-name { color:#0f172a; text-shadow:none; }
    .ft-card-stats { display:flex; align-items:center; gap:6px; margin-top:6px; }
    .ft-chip { height:20px; padding:0 7px; border-radius:6px; display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; background:rgba(0,0,0,.16); color:#fff; }
    .ft-rarity-COMMON .ft-chip { background:rgba(0,0,0,.12); color:#0f172a; }
    .ft-card-weight { margin-top:5px; font-size:11px; color:rgba(255,255,255,.9); }
    .ft-rarity-COMMON .ft-card-weight { color:rgba(15,23,42,.82); }
  </style>
</head>
